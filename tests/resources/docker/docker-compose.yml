services:
  traefik:
    image: traefik:2.2
    container_name: indobase-traefik
    command:
      - --log.level=DEBUG
      - --api.insecure=true
      - --providers.file.directory=/storage/config
      - --providers.file.watch=true
      - --providers.docker=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --accesslog=true
    restart: unless-stopped
    ports:
      - 2080:80
      - 2443:443
      - 8080:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - indobase-config:/storage/config:ro
      - indobase-certificates:/storage/certificates:ro
    depends_on:
      - indobase
    networks:
      - gateway
      - indobase

  indobase:
    container_name: indobase
    build:
      context: .
      args:
        - TESTING=true
        - VERSION=dev
    restart: unless-stopped
    ports:
      - "9501:80"
    networks:
      - indobase
    labels:
      - traefik.http.routers.indobase.rule=PathPrefix(`/`)
      - traefik.http.routers.indobase-secure.rule=PathPrefix(`/`)
      - traefik.http.routers.indobase-secure.tls=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - indobase-uploads:/storage/uploads:rw
      - indobase-cache:/storage/cache:rw
      - indobase-config:/storage/config:rw
      - indobase-certificates:/storage/certificates:rw
      - indobase-functions:/storage/functions:rw
      - ./phpunit.xml:/usr/src/code/phpunit.xml
      - ./tests:/usr/src/code/tests
      - ./app:/usr/src/code/app
      - ./docs:/usr/src/code/docs
      - ./public:/usr/src/code/public
      - ./src:/usr/src/code/src
    depends_on:
      - mariadb
      - redis
    environment:
      - _APP_COMPRESSION_MIN_SIZE_BYTES
      - _APP_ENV
      - _APP_OPTIONS_ABUSE
      - _APP_OPTIONS_ROUTER_PROTECTION
      - _APP_OPTIONS_FORCE_HTTPS
      - _APP_OPTIONS_ROUTER_FORCE_HTTPS
      - _APP_OPENSSL_KEY_V1
      - _APP_DOMAIN
      - _APP_DOMAIN_FUNCTIONS
      - _APP_DOMAIN_TARGET
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS
      - _APP_USAGE_STATS
      - _APP_STORAGE_ANTIVIRUS=disabled
      - _APP_STORAGE_LIMIT
      - _APP_FUNCTIONS_TIMEOUT
      - _APP_SITES_TIMEOUT
      - _APP_COMPUTE_CPUS
      - _APP_COMPUTE_MEMORY
      - _APP_EXECUTOR_HOST

  indobase-worker-stats-usage:
    entrypoint: worker-stats-usage
    container_name: indobase-worker-stats-usage
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT

  indobase-worker-audits:
    entrypoint: worker-audits
    container_name: indobase-worker-audits
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS

  indobase-worker-webhooks:
    entrypoint: worker-webhooks
    container_name: indobase-worker-webhooks
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS

  indobase-worker-tasks:
    entrypoint: worker-tasks
    container_name: indobase-worker-tasks
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS

  indobase-worker-deletes:
    entrypoint: worker-deletes
    container_name: indobase-worker-deletes
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    volumes:
      - indobase-uploads:/storage/uploads:rw
      - indobase-cache:/storage/cache:rw
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS
      - _APP_EXECUTOR_HOST

  indobase-worker-certificates:
    entrypoint: worker-certificates
    container_name: indobase-worker-certificates
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    volumes:
      - indobase-config:/storage/config:rw
      - indobase-certificates:/storage/certificates:rw
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS

  indobase-worker-functions:
    entrypoint: worker-functions
    container_name: indobase-worker-functions
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - mariadb
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp:rw
      - indobase-functions:/storage/functions:rw
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS
      - _APP_FUNCTIONS_TIMEOUT
      - _APP_SITES_TIMEOUT
      - _APP_COMPUTE_CPUS
      - _APP_COMPUTE_MEMORY
      - _APP_EXECUTOR_HOST

  indobase-worker-mails:
    entrypoint: worker-mails
    container_name: indobase-worker-mails
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
      - maildev
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_SMTP_HOST
      - _APP_SMTP_PORT

  indobase-worker-builds:
    entrypoint: worker-builds
    container_name: indobase-worker-builds
    build:
      context: .
    networks:
      - indobase
    volumes:
      - ./app:/usr/src/code/app
      - ./src:/usr/src/code/src
    depends_on:
      - redis
      - mariadb
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT
      - _APP_REDIS_USER
      - _APP_REDIS_PASS
      - _APP_DB_HOST
      - _APP_DB_PORT
      - _APP_DB_SCHEMA
      - _APP_DB_USER
      - _APP_DB_PASS
      - _APP_LOGGING_CONFIG
      - _APP_EXECUTOR_SECRET
      - _APP_EXECUTOR_HOST

  indobase-schedule:
    entrypoint: schedule
    container_name: indobase-schedule
    build:
      context: .
    restart: unless-stopped
    networks:
      - indobase
    depends_on:
      - redis
    environment:
      - _APP_ENV
      - _APP_REDIS_HOST
      - _APP_REDIS_PORT

  mariadb:
    image: indobase/mariadb:1.2.0 # fix issues when upgrading using: mysql_upgrade -u root -p
    container_name: indobase-mariadb
    restart: unless-stopped
    networks:
      - indobase
    volumes:
      - indobase-mariadb:/var/lib/mysql:rw
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootsecretpassword
      - MYSQL_DATABASE=indobase
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MARIADB_AUTO_UPGRADE=1
    command: 'mysqld --innodb-flush-method=fsync'

  maildev:
    image: djfarrelly/maildev
    container_name: indobase-maildev
    restart: unless-stopped
    ports:
      - '1080:80'
    networks:
      - indobase

  # smtp:
  #   image: indobase/smtp:1.0.1
  #   container_name: indobase-smtp
  #   restart: unless-stopped
  #   networks:
  #     - indobase
  #   environment:
  #     - MAILNAME=indobase
  #     - RELAY_NETWORKS=:192.168.0.0/24:10.0.0.0/16

  redis:
    image: redis:5.0
    container_name: indobase-redis
    restart: unless-stopped
    networks:
      - indobase
    volumes:
      - indobase-redis:/data:rw

networks:
  gateway:
  indobase:

volumes:
  indobase-mariadb:
  indobase-redis:
  indobase-cache:
  indobase-uploads:
  indobase-certificates:
  indobase-functions:
  indobase-config:
